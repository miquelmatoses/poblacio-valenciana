name: Actualitzar dades INE

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 1 */3 *'  # Cada 3 mesos, dia 1, a les 8:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instal·lar dependencies Python
        run: pip install -r scripts/requirements.txt

      - name: Instal·lar dependencies sistema
        run: sudo apt-get update && sudo apt-get install -y gifsicle

      - name: Descarregar dades de l'INE
        run: python scripts/update_data.py

      - name: Generar visualitzacio
        run: python scripts/generate_chart.py

      - name: Optimitzar GIF
        run: |
          gifsicle -O3 --lossy=80 --colors 64 assets/bar_chart_race.gif -o assets/bar_chart_race_opt.gif
          mv assets/bar_chart_race_opt.gif assets/bar_chart_race.gif

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Actualitzar dades INE ($(date +%Y-%m-%d))"
          git push
